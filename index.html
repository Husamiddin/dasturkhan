<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dasturkhan Bar</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mogra&family=Oswald:wght@200..700&family=Playwrite+IE:wght@100..400&display=swap');
        :root { 
            --gold: #D4AF37; 
            --white: #ffffff; 
            --glass: rgba(15, 15, 15, 0.85); 
            --accent: #1e3d1a; 
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F1D18A 50%, #D4AF37 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #050505 url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        .overlay { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.92)); 
            min-height: 100vh; 
            padding-bottom: 120px; 
        }

        header {
            text-align: center; 
            padding: 40px 10px;
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--gold);
            position: relative;
        }

        /* LOGO MOBIL VA PC UCHUN MOSLASHDI */
        .logo {
            font-family: "Playwrite IE", cursive;
            font-size: clamp(2.2rem, 10vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase; 
            letter-spacing: 6px;
            background: var(--gold-gradient);
            --webkit-background-clip: text;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.8));
            margin: 0 auto;
        }

        .waiter-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: var(--gold-gradient); color: #000; border: none;
            padding: 12px 25px; border-radius: 50px; font-weight: 800;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .sticky-nav {
            position: sticky; top: 0; z-index: 999;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .search-box { max-width: 600px; margin: 0 auto; padding: 0 20px; }
        #searchInput {
            width: 100%; padding: 15px 25px; border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.4); background: rgba(255,255,255,0.05);
            color: white; font-size: 1rem; outline: none;
        }

        .categories {
            display: flex; gap: 12px; overflow-x: auto; 
            padding: 20px; scrollbar-width: none; justify-content: start;
        }
        .categories::-webkit-scrollbar { display: none; }
        @media (min-width: 768px) { .categories { justify-content: center; } }

        .cat-btn {
            padding: 10px 25px; border-radius: 50px; border: 1px solid #333;
            background: var(--glass); color: #aaa; cursor: pointer; 
            white-space: nowrap; transition: 0.4s; font-weight: 500;
        }
        .cat-btn.active { 
            background: var(--gold-gradient); color: #000; 
            border-color: transparent; font-weight: 800; transform: scale(1.05);
        }

        /* TUGMALAR DIZAYNI */
        .lang-switch { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .btn-lang {
            background: transparent; border: 1px solid var(--gold);
            color: var(--gold); padding: 8px 20px; border-radius: 50px;
            cursor: pointer; font-weight: 800; transition: 0.3s;
        }
        .btn-lang.active { background: var(--gold-gradient); color: #000; border-color: transparent; }

        /* MENU GRID - PC VA ANDROID UCHUN ALOHIDA */
        .menu-grid {
            max-width: 1400px; margin: 20px auto;
            display: grid;
            padding: 15px;
            /* DEFAULT: Android/Mobil uchun 2 ta ustun */
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* PC UCHUN 4 TA USTUN */
        @media (min-width: 1024px) {
            .menu-grid { grid-template-columns: repeat(4, 1fr); gap: 30px; }
        }

        /* PLANSHET UCHUN 3 TA USTUN */
        @media (min-width: 768px) and (max-width: 1023px) {
            .menu-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
        }

        .card {
            background: var(--glass); border-radius: 25px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.4s;
            position: relative;
        }

        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; transition: 0.5s; }
        .card-info { padding: 15px; background: linear-gradient(to top, #000, transparent); }
        
        /* MOBILDA MATN O'LCHAMI */
        .card-title { font-size: 1rem; color: var(--gold); font-weight: 800; margin-bottom: 5px; height: 2.4em; overflow: hidden; }
        .card-price { font-size: 1.1rem; font-weight: 900; color: #fff; }

        @media (min-width: 768px) {
            .card-info { padding: 25px; }
            .card-title { font-size: 1.4rem; }
            .card-price { font-size: 1.3rem; }
        }

        .btn-add {
            position: absolute; bottom: 15px; right: 15px;
            background: var(--gold-gradient); color: #000; border: none;
            width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
        }
        @media (min-width: 768px) {
            .btn-add { width: 55px; height: 55px; bottom: 25px; right: 25px; border-radius: 20px; }
        }

        /* SAVATCHA MOBILGA MOSLASHDI */
        .cart-float {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(200px);
            width: 90%; max-width: 500px; background: var(--accent);
            padding: 15px 25px; border-radius: 25px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); z-index: 1000; transition: 0.6s;
        }
        .cart-float.active { transform: translateX(-50%) translateY(0); }
        
        .reset-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 10px 15px; border-radius: 12px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="overlay">
    <button class="waiter-btn animate__animated animate__pulse animate__infinite" onclick="alert('Waiter called!')">
        <i class="fas fa-bell"></i>
    </button>

    <header>
        <div class="logo animate__animated animate__zoomIn">Dasturkhan</div>
        <div class="lang-switch">
            <button class="btn-lang active" id="ruBtn" onclick="setLang('ru')">РУС</button>
            <button class="btn-lang" id="enBtn" onclick="setLang('en')">ENG</button>
        </div>
    </header>

    <div class="sticky-nav">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск..." onkeyup="filterMenu()">
        </div>
        <div class="categories" id="catBar"></div>
    </div>

    <div class="menu-grid" id="menuContainer"></div>

    <div class="cart-float" id="cartFloat">
        <div>
            <div id="cartCount" style="font-size: 0.8rem; font-weight: 600; color: var(--gold);">0 ТОВАРОВ</div>
            <div id="cartTotal" style="font-size: 1.4rem; font-weight: 900;">0 UZS</div>
        </div>
        <button class="reset-btn" onclick="location.reload()">Reset</button>
    </div>
</div>

<script>
    // MA'LUMOTLAR VA FUNKSIYALAR O'ZGARISHSIZ QOLDI
    const menuData = [
        { cat: 'salat', ru: "Шакароб", en: "Shakarob", p: 35000, img: "shakar ob.jpg" },
        { cat: 'salat', ru: "Ачик-чуchuk", en: "Achuchuk", p: 30000, img: "ashuk.jpg" },
        { cat: 'salat', ru: "Греческий салат", en: "Greek Salad", p: 60000, img: "pomidor salar grechiski.jpg" },
        { cat: 'salat', ru: "Греческий", en: "Greek Salad V2", p: 60000, img: "2 chi grechiski.jpg" },
        { cat: 'salat', ru: "Хрустящие баклажаны", en: "Crispy Eggplant", p: 60000, img: "baklachan.jpg" },
        { cat: 'salat', ru: "Лосось на подушке", en: "Salmon on Pillow", p: 80000, img: "losoya salat.jpg" },
        { cat: 'salat', ru: "Креветки с рукколой", en: "Shrimp & Rucola", p: 80000, img: "krevetki salat.jpg" },
        { cat: 'salat', ru: "Груша в карамели", en: "Caramel Pear", p: 60000, img: "karamamel.jpg" },
        { cat: 'salat', ru: "Рубиновая свёкла", en: "Beetroot Salad", p: 50000, img: "sbekla salat.jpg" },
        { cat: 'zakuska', ru: "Сырная тарелка", en: "Cheese Plate", p: 170000, img: "cheese plate.jpg" },
        { cat: 'zakuska', ru: "Антипаста Ciao", en: "Antipasta Ciao", p: 200000, img: "ciao.jpg" },
        { cat: 'zakuska', ru: "Долма", en: "Dolma", p: 60000, img: "dolma.jpg" },
        { cat: 'zakuska', ru: "Тартар из говядины", en: "Beef Tartare", p: 90000, img: "tartare.jpg" },
        { cat: 'zakuska', ru: "Биф-ролл", en: "Beef Roll", p: 80000, img: "roll.jpg" },
        { cat: 'zakuska', ru: "Самса мясная", en: "Meat Somsa", p: 25000, img: "gosht somsa.jpg" },
        { cat: 'pasta', ru: "Болоньезе", en: "Bolognese", p: 60000, img: "bolognese.jpg" },
        { cat: 'pasta', ru: "Карбонара с уткой", en: "Duck Carbonara", p: 60000, img: "carbonara.jpg" },
        { cat: 'steak', ru: "Рибай стейк", en: "Ribeye Steak", p: 60000, img: "steak.jpg" },
        { cat: 'steak', ru: "Бон филе", en: "Bon Fillet", p: 180000, img: "fillet.jpg" },
        { cat: 'first', ru: "Mastava", en: "Mastava", p: 40000, img: "mastava.jpg" },
        { cat: 'first', ru: "Крем суп", en: "Cream Soup", p: 30000, img: "krem sup.jpg" },
        { cat: 'drinks', ru: "Лимонад Манго-лайм", en: "Mango-Lime Lemonade", p: 90000, img: "mango lime.jpg" },
        { cat: 'drinks', ru: "Кофе Латте", en: "Latte Coffee", p: 35000, img: "latte.jpg" }
    ];

    let lang = 'ru';
    let currentCat = 'all';
    let cart = [];

    const cats = {
        ru: { all: "Все", salat: "Салаты", zakuska: "Закуски", first: "Первые", pasta: "Пасты", steak: "Стейки", drinks: "Бар" },
        en: { all: "All", salat: "Salads", zakuska: "Starters", first: "Soups", pasta: "Pastas", steak: "Steaks", drinks: "Bar" }
    };

    function setLang(l) {
        lang = l;
        document.getElementById('ruBtn').classList.toggle('active', l==='ru');
        document.getElementById('enBtn').classList.toggle('active', l==='en');
        renderCats();
        filterMenu();
    }

    function renderCats() {
        const nav = document.getElementById('catBar');
        nav.innerHTML = Object.keys(cats[lang]).map(k => `
            <button class="cat-btn ${currentCat===k?'active':''}" onclick="setCategory('${k}')">${cats[lang][k]}</button>
        `).join('');
    }

    function setCategory(c) {
        currentCat = c;
        renderCats();
        filterMenu();
    }

    function filterMenu() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = menuData.filter(i => {
            const name = lang === 'ru' ? i.ru.toLowerCase() : i.en.toLowerCase();
            return (currentCat === 'all' || i.cat === currentCat) && name.includes(q);
        });
        renderMenu(filtered);
    }

    function renderMenu(items) {
        const container = document.getElementById('menuContainer');
        container.innerHTML = items.map((i, index) => `
            <div class="card animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.05}s">
                <img src="${i.img}" class="card-img" onerror="this.src='https://via.placeholder.com/400x400/111/D4AF37?text=Food'">
                <div class="card-info">
                    <div class="card-title">${lang === 'ru' ? i.ru : i.en}</div>
                    <div class="card-price">${i.p.toLocaleString()} UZS</div>
                    <button class="btn-add" onclick="addToCart(${i.p})"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(price) {
        cart.push(price);
        const total = cart.reduce((a, b) => a + b, 0);
        const cartEl = document.getElementById('cartFloat');
        cartEl.classList.add('active');
        document.getElementById('cartCount').innerText = cart.length + (lang==='ru' ? " ТОВАРОВ" : " ITEMS");
        document.getElementById('cartTotal').innerText = total.toLocaleString() + " UZS";
        
        cartEl.classList.remove('animate__pulse');
        void cartEl.offsetWidth; 
        cartEl.classList.add('animate__animated', 'animate__pulse');
    }

    setLang('ru');
</script>
</body>
</html>
