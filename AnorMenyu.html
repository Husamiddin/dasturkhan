<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasturkhan | Pro Fresh Menu</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2D5A27; /* Ishtaha ochar yashil */
            --accent: #D4AF37;  /* Premium oltin */
            --light-bg: #FCFAF5; 
            --card: #ffffff;
            --text: #333;
            --desc: #777;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--light-bg);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            color: var(--text);
            font-family: 'Outfit', sans-serif;
        }

        /* --- HERO --- */
        .hero {
            padding: 60px 20px;
            text-align: center;
            background: #fff;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            border-radius: 0 0 50px 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 8vw, 5rem);
            color: var(--primary);
            font-style: italic;
            margin-bottom: 30px;
        }

        .promo-wrap { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .promo-box {
            width: 280px; height: 380px; border-radius: 30px; overflow: hidden;
            border: 5px solid #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative; transition: 0.4s;
        }
        .promo-box img { width: 100%; height: 100%; object-fit: cover; }
        .promo-box:hover { transform: translateY(-10px); }

        /* --- NAV --- */
        .nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            padding: 15px; display: flex; justify-content: center; gap: 10px;
        }

        .btn-lang {
            padding: 10px 25px; border-radius: 50px; border: 2px solid var(--primary);
            background: transparent; color: var(--primary); font-weight: 700; cursor: pointer;
        }
        .btn-lang.active { background: var(--primary); color: #fff; }

        /* --- GRID --- */
        .container { max-width: 1200px; margin: 40px auto 120px; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        .card {
            background: var(--card); border-radius: 40px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); position: relative; transition: 0.3s;
        }
        .card:hover { transform: scale(1.02); }

        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 25px; }
        .card-name { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        
        /* TAOM TARKIBI */
        .card-desc { font-size: 0.9rem; color: var(--desc); margin-bottom: 15px; line-height: 1.4; }
        
        .card-price { font-size: 1.2rem; color: var(--accent); font-weight: 800; }

        .add-btn {
            position: absolute; bottom: 25px; right: 25px;
            background: var(--primary); color: #fff; border: none;
            width: 55px; height: 55px; border-radius: 18px;
            font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* --- SMART CALCULATOR BAR --- */
        .calc-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(150px);
            width: 95%; max-width: 550px; background: var(--primary);
            padding: 15px 25px; border-radius: 25px; color: #fff;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 20px 40px rgba(45, 90, 39, 0.4); z-index: 2000;
            transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .calc-bar.active { transform: translateX(-50%) translateY(0); }

        .clear-btn {
            background: rgba(255,255,255,0.2); border: none; color: #fff;
            padding: 8px 15px; border-radius: 12px; cursor: pointer; font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .brand-logo { font-size: 3.5rem; }
            .promo-box { width: 100%; height: 350px; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1 class="brand-logo">Dasturkhan</h1>
        <div class="promo-wrap">
            <div class="promo-box"><img src="1-menu.jpg"></div>
            <div class="promo-box"><img src="2-menu.jpg"></div>
        </div>
    </header>

    <nav class="nav">
        <button class="btn-lang active" onclick="setLang('ru')">РУССКИЙ</button>
        <button class="btn-lang" onclick="setLang('en')">ENGLISH</button>
    </nav>

    <div class="container">
        <div class="grid" id="menu-grid"></div>
    </div>

    <div class="calc-bar" id="calc-bar">
        <div style="display:flex; flex-direction:column;">
            <span id="ui-count" style="font-weight:800; font-size:1.1rem;">0 БЛЮД</span>
            <button class="clear-btn" onclick="clearCart()" id="ui-clear">Очистить</button>
        </div>
        <div id="ui-total" style="font-size:1.5rem; font-weight:800; color: var(--accent);">0 UZS</div>
    </div>

    <script>
        const menuItems = [
            { 
                id: 1, 
                ru: "Шакар об", en: "Shakar Ob", 
                ruDesc: "Свежие томаты, тонкий лук и восточные специи.", 
                enDesc: "Fresh tomatoes, thin sliced onions and oriental spices.",
                p: 35000, img: "shakar ob.jpg" 
            },
            { 
                id: 2, 
                ru: "Ачук-чучук", en: "Achuchuk", 
                ruDesc: "Классический узбекский салат из спелых помидоров.", 
                enDesc: "Classic Uzbek salad with ripe tomatoes and onions.",
                p: 30000, img: "ashuk.jpg" 
            },
            { 
                id: 3, 
                ru: "Греческий салат", en: "Greek Salad", 
                ruDesc: "Сыр фета, маслины, свежие овощи и оливковое масло.", 
                enDesc: "Feta cheese, olives, fresh veggies and olive oil.",
                p: 60000, img: "pomidor salar grechiski.jpg" 
            },
            { 
                id: 7, 
                ru: "Хрустящие баклажаны", en: "Crispy Eggplant", 
                ruDesc: "Обжаренные баклажаны в кисло-сладком соусе.", 
                enDesc: "Deep-fried eggplants with sweet and sour sauce.",
                p: 60000, img: "baklachan.jpg" 
            },
            { 
                id: 10, 
                ru: "Мастава", en: "Mastava", 
                ruDesc: "Густой узбекский суп с рисом, мясом и овощами.", 
                enDesc: "Traditional rice soup with meat and vegetables.",
                p: 40000, img: "mastava.jpg" 
            },
            { 
                id: 11, 
                ru: "Тыквенный крем суп", en: "Pumpkin Cream Soup", 
                ruDesc: "Нежная тыква, сливки и ароматные гренки.", 
                enDesc: "Smooth pumpkin purée, cream and toasted croutons.",
                p: 30000, img: "krem sup.jpg" 
            }
        ];

        let cart = [];
        let lang = 'ru';

        function setLang(l) {
            lang = l;
            document.querySelectorAll('.btn-lang').forEach(b => {
                b.classList.toggle('active', b.innerText.toLowerCase().includes(l));
            });
            document.getElementById('ui-clear').innerText = lang === 'ru' ? 'Очистить' : 'Clear';
            render();
            updateCalc();
        }

        function render() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            menuItems.forEach(item => {
                const name = lang === 'ru' ? item.ru : item.en;
                const desc = lang === 'ru' ? item.ruDesc : item.enDesc;
                grid.innerHTML += `
                    <div class="card">
                        <img src="${item.img}" class="card-img" onerror="this.src='https://via.placeholder.com/400'">
                        <div class="card-info">
                            <div class="card-name">${name}</div>
                            <div class="card-desc">${desc}</div>
                            <div class="card-price">${item.p.toLocaleString()} UZS</div>
                            <button class="add-btn" onclick="add(${item.id})"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        function add(id) {
            const item = menuItems.find(i => i.id === id);
            cart.push(item);
            document.getElementById('calc-bar').classList.add('active');
            updateCalc();
        }

        function clearCart() {
            cart = [];
            document.getElementById('calc-bar').classList.remove('active');
            updateCalc();
        }

        function updateCalc() {
            let total = 0;
            cart.forEach(i => total += i.p);
            const countTxt = lang === 'ru' ? 'БЛЮД' : 'ITEMS';
            document.getElementById('ui-count').innerText = `${cart.length} ${countTxt}`;
            document.getElementById('ui-total').innerText = total.toLocaleString() + " UZS";
        }

        setLang('ru');
    </script>
</body>
</html>
